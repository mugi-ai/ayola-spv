<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ayola IT Portal – To-Do List</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Syne:wght@700;800;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20,400,1,0" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
</head>
<body>
<div id="appPage">
  <div class="sidebar" id="sidebar"></div>

  <div class="main">
    <div class="page">
      <div class="page-header">
        <h1>To-Do List</h1>
        <p>Kelola tugas dan agenda harian tim IT</p>
      </div>

      <!-- Progress bar -->
      <div class="card" style="margin-bottom:22px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
          <div class="card-title" style="margin-bottom:0"><span class="material-symbols-rounded">data_usage</span> Progress Tugas</div>
          <div style="font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:800;color:var(--teal)" id="progPct">0%</div>
        </div>
        <div style="background:#f0f5f7;border-radius:99px;height:12px;overflow:hidden">
          <div id="progBar" style="height:100%;width:0%;background:linear-gradient(90deg,var(--teal),var(--green));border-radius:99px;transition:width 0.6s ease"></div>
        </div>
        <div style="display:flex;gap:20px;margin-top:14px;font-size:0.8rem;color:var(--muted)">
          <span><strong id="prog-done" style="color:var(--green)">0</strong> selesai</span>
          <span><strong id="prog-todo" style="color:var(--ink)">0</strong> belum</span>
          <span><strong id="prog-total" style="color:var(--muted)">0</strong> total</span>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1.6fr;gap:22px">
        <!-- Add form -->
        <div class="card">
          <div class="card-title"><span class="material-symbols-rounded">add_task</span> Tambah Tugas</div>
          <form id="f-todo" onsubmit="addTodo(event)">
            <div class="form-group" style="margin-bottom:14px">
              <label>Nama Tugas</label>
              <input type="text" id="td-text" placeholder="Apa yang perlu dikerjakan?" required>
            </div>
            <div class="form-group" style="margin-bottom:14px">
              <label>PIC (Penanggung Jawab)</label>
              <input type="text" id="td-pic" placeholder="Nama teknisi">
            </div>
            <div class="form-group" style="margin-bottom:14px">
              <label>Prioritas</label>
              <select id="td-prior">
                <option value="normal">Normal</option>
                <option value="high">Tinggi</option>
                <option value="low">Rendah</option>
              </select>
            </div>
            <div class="form-group" style="margin-bottom:18px">
              <label>Deadline (opsional)</label>
              <input type="date" id="td-due">
            </div>
            <button class="btn btn-primary" type="submit" style="width:100%">
              <span class="material-symbols-rounded" style="font-size:16px">add</span> Tambah Tugas
            </button>
          </form>
        </div>

        <!-- Todo list -->
        <div class="card">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:10px">
            <div class="card-title" style="margin-bottom:0"><span class="material-symbols-rounded">checklist</span> Daftar Tugas</div>
            <div style="display:flex;gap:6px">
              <button onclick="setFilter('all')" id="f-all" class="btn btn-sm btn-secondary" style="font-size:0.75rem">Semua</button>
              <button onclick="setFilter('active')" id="f-active" class="btn btn-sm btn-secondary" style="font-size:0.75rem">Aktif</button>
              <button onclick="setFilter('done')" id="f-done" class="btn btn-sm btn-secondary" style="font-size:0.75rem">Selesai</button>
              <button onclick="clearDone()" class="btn btn-sm btn-danger-sm" style="font-size:0.75rem" title="Hapus semua selesai">
                <span class="material-symbols-rounded" style="font-size:13px">delete_sweep</span>
              </button>
            </div>
          </div>
          <div id="todo-list">
            <div style="text-align:center;padding:32px;color:var(--muted);font-size:0.875rem">
              <span class="material-symbols-rounded" style="display:block;font-size:36px;margin-bottom:8px;opacity:0.3">checklist</span>
              Belum ada tugas. Tambah yang pertama!
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<div id="toast"></div>
<script src="sidebar-builder.js"></script>
<script>
const API = "https://sheetdb.io/api/v1/blk7obm7z1uo2";
let todos = JSON.parse(localStorage.getItem('ayola_todos_v2')) || [];
let currentFilter = 'all';

function save() { localStorage.setItem('ayola_todos_v2', JSON.stringify(todos)); }

async function loadTodos() {
  try {
    const ro = await fetch(API+'?sheet=todolist').then(r=>r.json());
    if (Array.isArray(ro) && ro.length) {
      todos = ro.map((i,idx) => ({
        id:   idx,
        row_id: i.row_id || '',
        text: i.tugas || '-',
        pic:  i.pic   || '',
        prior: i.prioritas || 'normal',
        due:  i.deadline || '',
        done: i.status === 'Selesai'
      }));
      save();
    }
  } catch(e) {}
  renderTodos();
}

function addTodo(e) {
  e.preventDefault();
  const newRowId = 'td_' + Date.now();
  const item = {
    id:   Date.now(),
    row_id: newRowId,
    text: document.getElementById('td-text').value,
    pic:  document.getElementById('td-pic').value || (localStorage.getItem('namaUser')||''),
    prior: document.getElementById('td-prior').value,
    due:  document.getElementById('td-due').value,
    done: false,
  };
  todos.unshift(item);
  save(); renderTodos(); e.target.reset();
  showToast('Tugas ditambahkan!', 'ok');
  fetch(API+'?sheet=todolist', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ data:[{ row_id:newRowId, tugas:item.text, pic:item.pic, prioritas:item.prior, deadline:item.due, status:'Belum' }] })
  }).catch(()=>{});
}

function toggleTodo(id) {
  const t = todos.find(x => x.id === id);
  if (t) {
    t.done = !t.done;
    save(); renderTodos();
    if (t.row_id) {
      fetch(`${API}/row_id/${encodeURIComponent(t.row_id)}?sheet=todolist`, {
        method:'PATCH', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ data:{ status: t.done ? 'Selesai' : 'Belum' } })
      }).catch(()=>{});
    }
  }
}

function deleteTodo(id) {
  const t = todos.find(x => x.id === id);
  todos = todos.filter(x => x.id !== id);
  save(); renderTodos(); showToast('Tugas dihapus.', 'ok');
  if (t && t.row_id) {
    fetch(`${API}/row_id/${encodeURIComponent(t.row_id)}?sheet=todolist`, { method:'DELETE' }).catch(()=>{});
  }
}

function clearDone() {
  if (!todos.filter(t=>t.done).length) return;
  if (!confirm('Hapus semua tugas yang sudah selesai?')) return;
  const doneItems = todos.filter(t => t.done);
  todos = todos.filter(t => !t.done);
  save(); renderTodos(); showToast('Tugas selesai dihapus.', 'ok');
  doneItems.forEach(t => {
    if (t.row_id) {
      fetch(`${API}/row_id/${encodeURIComponent(t.row_id)}?sheet=todolist`, { method:'DELETE' }).catch(()=>{});
    }
  });
}

function setFilter(f) {
  currentFilter = f;
  ['all','active','done'].forEach(k => {
    const btn = document.getElementById('f-'+k);
    if (btn) {
      btn.className = 'btn btn-sm ' + (k === f ? 'btn-primary' : 'btn-secondary');
      btn.style.fontSize = '0.75rem';
    }
  });
  renderTodos();
}

const priorColors = { high:'var(--red)', normal:'var(--teal)', low:'var(--muted)' };
const priorLabel  = { high:'Tinggi', normal:'Normal', low:'Rendah' };

function renderTodos() {
  const done  = todos.filter(t=>t.done).length;
  const total = todos.length;
  const pct   = total ? Math.round(done/total*100) : 0;
  document.getElementById('progBar').style.width  = pct+'%';
  document.getElementById('progPct').textContent  = pct+'%';
  document.getElementById('prog-done').textContent = done;
  document.getElementById('prog-todo').textContent = total-done;
  document.getElementById('prog-total').textContent = total;

  let filtered = todos;
  if (currentFilter === 'active') filtered = todos.filter(t=>!t.done);
  if (currentFilter === 'done')   filtered = todos.filter(t=>t.done);

  const el = document.getElementById('todo-list');
  if (!filtered.length) {
    el.innerHTML = `<div style="text-align:center;padding:32px;color:var(--muted);font-size:0.875rem">
      <span class="material-symbols-rounded" style="display:block;font-size:36px;margin-bottom:8px;opacity:0.3">check_circle</span>
      ${currentFilter==='done' ? 'Belum ada tugas selesai.' : currentFilter==='active' ? 'Semua tugas selesai! 🎉' : 'Belum ada tugas.'}
    </div>`;
    return;
  }

  const today = new Date().toISOString().slice(0,10);
  el.innerHTML = filtered.map(t => {
    const overdue = !t.done && t.due && t.due < today;
    const dueLabel = t.due ? `<span style="font-size:0.72rem;color:${overdue?'var(--red)':'var(--muted)'}">
      <span class="material-symbols-rounded" style="font-size:12px;vertical-align:middle">${overdue?'warning':'calendar_month'}</span>
      ${overdue?'Terlambat: ':''}${t.due}</span>` : '';

    return `
      <div class="todo-item ${t.done?'done':''}">
        <div class="todo-check ${t.done?'checked':''}" onclick="toggleTodo(${t.id})">
          ${t.done ? '<span class="material-symbols-rounded">check</span>' : ''}
        </div>
        <div style="flex:1;min-width:0">
          <div class="todo-text" style="font-size:0.875rem">${t.text}</div>
          <div style="display:flex;align-items:center;gap:8px;margin-top:4px;flex-wrap:wrap">
            ${t.pic ? `<span class="todo-pic"><span class="material-symbols-rounded" style="font-size:11px;vertical-align:middle">person</span> ${t.pic}</span>` : ''}
            ${t.prior !== 'normal' ? `<span style="font-size:0.68rem;font-weight:700;color:${priorColors[t.prior]}">${priorLabel[t.prior]}</span>` : ''}
            ${dueLabel}
          </div>
        </div>
        <button class="todo-del" onclick="deleteTodo(${t.id})" title="Hapus">
          <span class="material-symbols-rounded">close</span>
        </button>
      </div>`;
  }).join('');
}

window.onload = () => {
  if (!authGuard()) return;
  buildSidebar('todo');
  setFilter('all');
  loadTodos();
};
</script>
</body>
</html>

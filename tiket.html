<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ayola IT Portal – Tiket Kerusakan</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Syne:wght@700;800;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20,400,1,0" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
</head>
<body>
<div id="appPage">
  <div class="sidebar" id="sidebar"></div>

  <div class="main">
    <div class="page">
      <div class="page-header">
        <h1>Tiket Kerusakan</h1>
        <p>Catat dan pantau laporan kerusakan perangkat IT</p>
      </div>

      <!-- Buat Tiket (semua bisa) -->
      <div class="card" style="margin-bottom:22px">
        <div class="card-title"><span class="material-symbols-rounded">add_circle</span> Buat Tiket Baru</div>
        <form id="f-tiket" onsubmit="submitTiket(event)">
          <div class="form-grid">
            <div class="form-group">
              <label>Nama Pelapor</label>
              <input id="t-lapor" placeholder="Nama karyawan" required>
            </div>
            <div class="form-group">
              <label>Departemen</label>
              <select id="t-dept">
                <option>Housekeeping</option><option>Engineering</option>
                <option>Front Office</option><option>Accounting</option>
                <option>HRD</option><option>Sales & Marketing</option>
                <option>F&B</option><option>Security</option><option>IT</option>
              </select>
            </div>
            <div class="form-group">
              <label>Judul Masalah</label>
              <input id="t-judul" placeholder="Contoh: Printer lantai 2 error" required>
            </div>
            <div class="form-group">
              <label>Prioritas</label>
              <select id="t-prior">
                <option value="Rendah">Rendah</option>
                <option value="Sedang">Sedang</option>
                <option value="Tinggi">Tinggi</option>
              </select>
            </div>
          </div>
          <div class="form-group" style="margin-bottom:16px">
            <label>Deskripsi Masalah</label>
            <textarea id="t-desc" rows="2" placeholder="Jelaskan masalah secara singkat..." style="resize:vertical"></textarea>
          </div>
          <button class="btn btn-danger" type="submit">
            <span class="material-symbols-rounded" style="font-size:16px">send</span> Kirim Tiket
          </button>
        </form>
      </div>

      <!-- Daftar Tiket -->
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px">
          <div class="card-title" style="margin-bottom:0"><span class="material-symbols-rounded">inbox</span> Daftar Tiket</div>
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
            <select id="filterStatus" onchange="renderTiket()" style="padding:9px 14px;border:1.5px solid var(--border);border-radius:10px;font-family:inherit;font-size:0.82rem;outline:none">
              <option value="">Semua Status</option>
              <option value="Open">Open</option>
              <option value="In Progress">In Progress</option>
              <option value="Closed">Closed</option>
            </select>
            <select id="filterPrior" onchange="renderTiket()" style="padding:9px 14px;border:1.5px solid var(--border);border-radius:10px;font-family:inherit;font-size:0.82rem;outline:none">
              <option value="">Semua Prioritas</option>
              <option>Tinggi</option><option>Sedang</option><option>Rendah</option>
            </select>
          </div>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID Tiket</th><th>Pelapor</th><th>Dept</th><th>Masalah</th>
                <th>Prioritas</th><th>Status</th><th>Aksi</th>
              </tr>
            </thead>
            <tbody id="t-tiket"></tbody>
          </table>
        </div>
        <div id="empty-tiket" style="text-align:center;padding:40px;color:var(--muted);display:none">
          <span class="material-symbols-rounded" style="font-size:40px;display:block;margin-bottom:8px;opacity:0.4">confirmation_number</span>
          Tidak ada tiket aktif
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal detail / update status (admin only) -->
<div class="modal-overlay" id="detailModal">
  <div class="modal-box" style="width:460px">
    <div class="modal-header">
      <h3 id="dm-title">Detail Tiket</h3>
      <button class="modal-close" onclick="closeDetail()"><span class="material-symbols-rounded">close</span></button>
    </div>
    <div id="dm-body"></div>
    <div id="dm-admin" style="display:none;margin-top:22px">
      <div class="form-group" style="margin-bottom:16px">
        <label>Update Status</label>
        <select id="dm-status" style="width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-family:inherit;font-size:0.9rem;outline:none">
          <option value="Open">Open</option>
          <option value="In Progress">In Progress</option>
          <option value="Closed">Closed</option>
        </select>
      </div>
      <div class="form-group" style="margin-bottom:16px">
        <label>Catatan Teknisi</label>
        <textarea id="dm-note" rows="2" placeholder="Catatan penanganan..." style="width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-family:inherit;font-size:0.88rem;resize:vertical;outline:none"></textarea>
      </div>
      <button class="btn btn-primary" onclick="updateTiket()" style="width:100%">
        <span class="material-symbols-rounded" style="font-size:16px">save</span> Simpan Perubahan
      </button>
    </div>
  </div>
</div>

<div id="toast"></div>
<script src="sidebar-builder.js"></script>
<script>
const API = "https://sheetdb.io/api/v1/uflcumfapg0oz";
let tickets = JSON.parse(localStorage.getItem('ayola_tickets')) || [
  { id:'TKT-001', lapor:'Budi Santoso', dept:'Engineering', judul:'Printer lantai 2 error', prior:'Sedang', status:'Open', desc:'', note:'' }
];
let editIdx = -1;

function save() { localStorage.setItem('ayola_tickets', JSON.stringify(tickets)); }

async function loadTickets() {
  try {
    const rt = await fetch(API+'?sheet=tickets').then(r=>r.json());
    if (Array.isArray(rt) && rt.length) {
      tickets = rt.map((i,idx) => ({
        id:    `TKT-${String(idx+1).padStart(3,'0')}`,
        lapor: i.pelapor || '-',
        dept:  i.departemen || 'General',
        judul: i.masalah || '-',
        prior: i.prioritas || 'Sedang',
        status: i.status_tiket || 'Open',
        desc:  i.deskripsi || '',
        note:  i.catatan || ''
      }));
      save();
    }
  } catch(e) {}
  renderTiket();
}

function submitTiket(e) {
  e.preventDefault();
  const item = {
    id:     'TKT-' + String(tickets.length + 1).padStart(3,'0'),
    lapor:  document.getElementById('t-lapor').value,
    dept:   document.getElementById('t-dept').value,
    judul:  document.getElementById('t-judul').value,
    prior:  document.getElementById('t-prior').value,
    desc:   document.getElementById('t-desc').value,
    status: 'Open',
    note:   '',
    tgl:    new Date().toLocaleDateString('id-ID')
  };
  tickets.unshift(item);
  save();
  renderTiket();
  e.target.reset();
  showToast('Tiket berhasil dikirim!', 'ok');
  fetch(API+'?sheet=tickets', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ data:[{ pelapor:item.lapor, departemen:item.dept, masalah:item.judul, prioritas:item.prior, deskripsi:item.desc, status_tiket:'Open', catatan:'' }] })
  }).catch(()=>{});
}

function openDetail(idx) {
  editIdx = idx;
  const t = tickets[idx];
  const admin = isAdmin();
  document.getElementById('dm-title').textContent = `Detail — ${t.id}`;
  document.getElementById('dm-body').innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;font-size:0.855rem">
      <div><div style="font-size:0.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:4px">Pelapor</div><strong>${t.lapor}</strong></div>
      <div><div style="font-size:0.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:4px">Departemen</div><span class="badge badge-teal">${t.dept}</span></div>
      <div style="grid-column:1/-1"><div style="font-size:0.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:4px">Masalah</div><strong>${t.judul}</strong></div>
      ${t.desc ? `<div style="grid-column:1/-1"><div style="font-size:0.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:4px">Deskripsi</div><p style="color:var(--muted);line-height:1.5">${t.desc}</p></div>` : ''}
      <div><div style="font-size:0.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:4px">Prioritas</div><span class="badge ${prMap[t.prior]||'badge-gray'}">${t.prior}</span></div>
      <div><div style="font-size:0.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:4px">Status</div><span class="badge ${stMap[t.status]||'badge-gray'}">${t.status}</span></div>
      ${t.note ? `<div style="grid-column:1/-1;background:#f6fafc;border-left:3px solid var(--teal);padding:10px 14px;border-radius:0 8px 8px 0"><div style="font-size:0.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:4px">Catatan Teknisi</div><p style="font-size:0.82rem">${t.note}</p></div>` : ''}
    </div>`;

  const adminPanel = document.getElementById('dm-admin');
  if (admin) {
    adminPanel.style.display = 'block';
    document.getElementById('dm-status').value = t.status;
    document.getElementById('dm-note').value   = t.note || '';
  } else {
    adminPanel.style.display = 'none';
  }
  document.getElementById('detailModal').classList.add('active');
}

const prMap = { Tinggi:'badge-red', Sedang:'badge-amber', Rendah:'badge-green' };
const stMap = { Open:'badge-blue', 'In Progress':'badge-amber', Closed:'badge-gray' };

function updateTiket() {
  if (editIdx < 0) return;
  tickets[editIdx].status = document.getElementById('dm-status').value;
  tickets[editIdx].note   = document.getElementById('dm-note').value;
  save();
  renderTiket();
  closeDetail();
  showToast('Status tiket diperbarui!', 'ok');
}

function closeDetail() {
  document.getElementById('detailModal').classList.remove('active');
  editIdx = -1;
}

function renderTiket() {
  const fs = document.getElementById('filterStatus').value;
  const fp = document.getElementById('filterPrior').value;
  const filtered = tickets.filter(t =>
    (!fs || t.status === fs) && (!fp || t.prior === fp)
  );

  const tb = document.getElementById('t-tiket');
  const em = document.getElementById('empty-tiket');
  const admin = isAdmin();

  if (!filtered.length) { tb.innerHTML=''; em.style.display='block'; return; }
  em.style.display = 'none';

  tb.innerHTML = filtered.map((t, fi) => {
    const realIdx = tickets.indexOf(t);
    const closedBtn = admin && t.status !== 'Closed'
      ? `<button class="btn btn-success-sm" onclick="quickClose(${realIdx})" style="margin-right:4px">
           <span class="material-symbols-rounded" style="font-size:12px">check</span> Selesai</button>`
      : '';
    return `
      <tr style="cursor:pointer">
        <td onclick="openDetail(${realIdx})"><strong style="font-family:'Syne',sans-serif;font-size:0.8rem;color:var(--teal)">${t.id}</strong></td>
        <td onclick="openDetail(${realIdx})" style="font-weight:500">${t.lapor}</td>
        <td onclick="openDetail(${realIdx})"><span class="badge badge-teal">${t.dept}</span></td>
        <td onclick="openDetail(${realIdx})" style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.judul}</td>
        <td onclick="openDetail(${realIdx})"><span class="badge ${prMap[t.prior]||'badge-gray'}">${t.prior}</span></td>
        <td onclick="openDetail(${realIdx})"><span class="badge ${stMap[t.status]||'badge-gray'}">${t.status}</span></td>
        <td>
          ${closedBtn}
          ${admin ? `<button class="btn btn-sm btn-secondary" onclick="openDetail(${realIdx})" title="Edit">
            <span class="material-symbols-rounded" style="font-size:14px">edit</span></button>` 
          : `<button class="btn btn-sm btn-secondary" onclick="openDetail(${realIdx})">
            <span class="material-symbols-rounded" style="font-size:14px">visibility</span></button>`}
        </td>
      </tr>`;
  }).join('');
}

function quickClose(idx) {
  tickets[idx].status = 'Closed';
  save(); renderTiket(); showToast('Tiket ditutup!', 'ok');
}

window.onload = () => {
  if (!authGuard()) return;
  buildSidebar('tiket');
  loadTickets();
};
</script>
</body>
</html>
